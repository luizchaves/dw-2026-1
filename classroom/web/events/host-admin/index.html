  <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <header class="mb-10 text-center">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Painel de Hosts</p>
      <h1 class="mt-4 text-4xl font-bold tracking-tight text-slate-900 sm:text-5xl">Hosts disponíveis</h1>
      <p class="mt-3 text-base text-slate-600 sm:text-lg">Visualize informações básicas dos hosts em um grid responsivo.</p>
    </header>

    <section class="mb-10 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h2 class="text-2xl font-semibold text-slate-900">Adicionar novo host</h2>
          <p class="mt-2 text-sm text-slate-500">Preencha os dados para cadastrar um host no painel.</p>
        </div>
      </div>

      <form class="mt-8 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Nome do host</span>
          <input type="text" name="name" placeholder="Host Novo" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
        </label>

        <label class="block">
          <span class="text-sm font-medium text-slate-700">Endereço IP</span>
          <input type="text" name="ip" placeholder="192.168.0.99" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
        </label>

        <label class="block">
          <span class="text-sm font-medium text-slate-700">Sistema Operacional</span>
          <input type="text" name="os" placeholder="Ubuntu 24.04" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
        </label>

        <label class="block">
          <span class="text-sm font-medium text-slate-700">Grupo</span>
          <input type="text" name="group" placeholder="Produção" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
        </label>

        <label class="block">
          <span class="text-sm font-medium text-slate-700">Status</span>
          <select name="status" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200">
            <option>Online</option>
            <option>Manutenção</option>
            <option>Offline</option>
          </select>
        </label>

        <div class="flex items-end">
          <button type="submit" class="inline-flex w-full justify-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400">Adicionar host</button>
        </div>
      </form>
    </section>

  <script>
    function nanoid(size = 10) {
      return [...crypto.getRandomValues(new Uint8Array(size))]
        .map((value) => value.toString(36).padStart(2, '0'))
        .join('')
        .slice(0, size * 2);
    }

    const hosts = [
      {
        id: nanoid(),
        name: 'Alpha',
        group: 'Produção',
        status: 'Online',
        ip: '192.168.0.10',
        os: 'Ubuntu 22.04',
        uptime: '18 dias'
      },
      {
        id: nanoid(),
        name: 'Beta',
        group: 'Desenvolvimento',
        status: 'Manutenção',
        ip: '192.168.0.21',
        os: 'Windows Server 2019',
        uptime: '7 dias'
      },
      {
        id: nanoid(),
        name: 'Gamma',
        group: 'Testes',
        status: 'Offline',
        ip: '192.168.0.32',
        os: 'Debian 12',
        uptime: '—'
      },
      {
        id: nanoid(),
        name: 'Delta',
        group: 'Backup',
        status: 'Online',
        ip: '192.168.0.44',
        os: 'CentOS 7',
        uptime: '42 dias'
      },
      {
        id: nanoid(),
        name: 'Épsilon',
        group: 'Staging',
        status: 'Online',
        ip: '192.168.0.55',
        os: 'macOS Ventura',
        uptime: '12 dias'
      },
      {
        id: nanoid(),
        name: 'Zeta',
        group: 'Analytics',
        status: 'Manutenção',
        ip: '192.168.0.66',
        os: 'AlmaLinux 9',
        uptime: '2 dias'
      },
    ];

    function createHostCard(host) {
      let statusClass = '';
      switch (host.status) {
        case 'Online':
          statusClass = 'bg-emerald-100 text-emerald-700';
          break;
        case 'Manutenção':
          statusClass = 'bg-amber-100 text-amber-700';
          break;
        case 'Offline':
          statusClass = 'bg-slate-100 text-slate-700';
          break;
        default:
          statusClass = 'bg-slate-100 text-slate-700';
      }
      return `<div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:shadow-md relative group" data-id="${host.id}">
        <button type="button" aria-label="Excluir host" class="absolute z-10 top-2 right-2 p-2 rounded-full bg-white/80 shadow hover:bg-red-50 focus:bg-red-100 border border-slate-200 hover:border-red-300 focus:outline-none focus:ring-2 focus:ring-red-200 transition delete-host-btn opacity-0 group-hover:opacity-100 group-focus-within:opacity-100" tabindex="0">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="text-slate-400 hover:text-red-600 transition">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </button>
        <div>
          <h2 class="text-xl font-semibold text-slate-900">${host.name}</h2>
          <div class="flex justify-between">
            <p class="mt-1 text-sm text-slate-500">Grupo: ${host.group}</p>
            <span class="rounded-full px-3 py-1 text-xs font-semibold ${statusClass}">${host.status}</span>
          </div>
        </div>
        <dl class="mt-6 grid gap-4 text-sm text-slate-600">
          <div class="flex items-center justify-between">
            <dt>IP</dt>
            <dd>${host.ip}</dd>
          </div>
          <div class="flex items-center justify-between">
            <dt>S.O.</dt>
            <dd>${host.os}</dd>
          </div>
          <div class="flex items-center justify-between">
            <dt>Uptime</dt>
            <dd>${host.uptime}</dd>
          </div>
        </dl>
      </div>`;
    }

    const hostsContainer = document.querySelector('section.grid');

    function renderHosts() {
      hostsContainer.innerHTML = '';
      hosts.forEach(host => {
        hostsContainer.insertAdjacentHTML('beforeend', createHostCard(host));
      });

      // Adiciona evento de exclusão
      hostsContainer.querySelectorAll('.delete-host-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const card = btn.closest('[data-id]');
          const hostId = card.getAttribute('data-id');
          const hostIndex = hosts.findIndex(host => host.id === hostId);
          if (hostIndex !== -1) {
            hosts.splice(hostIndex, 1);
            renderHosts();
          }
        });
      });
    }

    renderHosts();

    const form = document.querySelector('form');

    form.onsubmit = (event) => {
      event.preventDefault();
      const formDatam = new FormData(form);
      const newHost = Object.fromEntries(formDatam.entries());
      newHost.id = nanoid();
      newHost.uptime = '—';
      hosts.push(newHost);
      renderHosts();
      form.reset();
    };
  </script>
