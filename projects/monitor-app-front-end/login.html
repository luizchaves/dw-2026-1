<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Host Monitor — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <i data-lucide="activity" class="w-7 h-7 text-indigo-600"></i>
          <span class="text-xl font-bold text-gray-900">Host Monitor</span>
        </a>
        <div class="flex items-center gap-3">
          <a href="login.html" class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-indigo-600 transition">Entrar</a>
          <a href="signup.html" class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Criar conta</a>
        </div>
      </div>
    </nav>

    <div class="min-h-[calc(100vh-73px)] flex items-center justify-center">
    <div class="w-full max-w-md px-4 py-12">
      <!-- Card de Login -->
      <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-8 space-y-6">
        <div>
          <h1 class="text-xl font-bold text-gray-900">Entrar na sua conta</h1>
          <p class="text-sm text-gray-500 mt-1">Preencha seus dados para acessar o painel</p>
        </div>

        <form class="space-y-4" action="#" method="post">
          <!-- E-mail -->
          <div class="space-y-1">
            <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
            <div class="relative">
              <i data-lucide="mail" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="seu@email.com"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
          </div>

          <!-- Senha -->
          <div class="space-y-1">
            <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
            <div class="relative">
              <i data-lucide="lock" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="••••••••"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
          </div>

          <!-- Botão -->
          <button
            type="submit"
            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium flex items-center justify-center gap-2"
          >
            <i data-lucide="log-in" class="w-4 h-4"></i>
            Entrar
          </button>
        </form>

        <!-- Link para cadastro -->
        <p class="text-sm text-center text-gray-500">
          Não tem conta?
          <a href="signup.html" class="text-indigo-600 hover:text-indigo-800 font-medium">Cadastre-se</a>
        </p>
      </div>
    </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
